# Adapter: Cline (docs.cline.bot)
#
# Describes how to copy and adapt files from content/ for Cline (VS Code
# extension + CLI). Read by both installation channels (AI-agent installer
# and install.ps1).
#
# Schema: closed adapter schema described in AGENT-INSTALL.md (Lean placement)
# and implemented by install.ps1.
# Notes:
#   - Always-on context: root `AGENTS.md` (Cline reads it as a cross-tool
#     rule source). Do NOT dump the full on-demand rule set into
#     `.clinerules/` — Cline eagerly loads every `.md` / `.txt` there into
#     every conversation and would explode the context window.
#   - On-demand rules: `.cline/rules-1c/` (explicit load via `AGENTS.md`),
#     same `rules-1c` pattern as Kilo / Kimi / Qwen.
#   - Project skills live in `.cline/skills/`. Source agent prompts stay under
#     `.cline/rules-1c/agents/` as references until a stable native format is
#     confirmed.
#   - Project slash-commands / workflows are not a stable project-local
#     contract in current Cline (workflows resolve from the global
#     `~/.cline/data/workflows/` tree). This adapter intentionally does
#     not invent a commands path — invoke workflows through skills /
#     `AGENTS.md` references instead.
#   - Project MCP lives in `.cline/mcp.json`; the installer merges only the
#     managed `mcpServers` entries and never writes user-global settings.
#   - Detection accepts both `.cline/` (current) and `.clinerules/`
#     (legacy eager-rules directory) so existing Cline projects are found
#     without re-installing.

tool: cline
schemaVersion: 1

detection:
  - exists: ".cline/"
  - exists: ".clinerules/"

rules:
  copyTo: ".cline/rules-1c/{name}.md"
  frontmatter:
    keep: [description, alwaysApply]
    drop: [globs, category]

agents:
  # Current Cline docs disagree between agents/ and agents.yaml. Keep the
  # source agent prompts as references until that native contract stabilizes.
  copyTo: ".cline/rules-1c/agents/{name}.md"
  referenceOnly: true
  frontmatter:
    keep: [name, description, modelHint]
    rename:
      modelHint: model
    drop: [tools, allowParallel, reasoningEffort, isSubagent]

skills:
  copyTo: ".cline/skills/{name}/"
  mode: verbatim

mcp:
  source: "content/mcp-servers.json"
  target: ".cline/mcp.json"
  schema: cline-mcp
  format: json
