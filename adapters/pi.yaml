# Adapter: Pi coding agent (pi.dev / earendil-works/pi)
#
# Describes how to copy and adapt files from content/ for the Pi coding agent.
# Read by both installation channels (AI-agent installer and install.ps1).
#
# Schema: closed adapter schema described in AGENT-INSTALL.md (Lean placement)
# and implemented by install.ps1.
# Notes:
#   - Pi loads always-on context from root `AGENTS.md` (and optionally
#     `CLAUDE.md`) via walk-up discovery. No separate entry stub is needed.
#   - On-demand rules are placed under `.pi/rules-1c/` and referenced from
#     `AGENTS.md` by path. Pi does not auto-discover a rules folder — the
#     agent reads files when `AGENTS.md` instructs it to.
#   - Skills: `.pi/skills/{name}/SKILL.md` (loaded after the project is
#     trusted; also discovers `.agents/skills/`).
#   - Slash-style reusable prompts are Pi "prompt templates" under
#     `.pi/prompts/{name}.md` (invoked as `/name`). Source `content/commands/`
#     are mapped here — there is no separate commands directory.
#   - Pi has no first-class project subagent directory. Agent prompts remain
#     references. MCP is mandatory through project `.pi/mcp.json` and the
#     pinned project package `npm:pi-mcp-extension@1.5.0`; project trust is
#     required before Pi loads either surface.

tool: pi
schemaVersion: 1

detection:
  - exists: ".pi/"

rules:
  copyTo: ".pi/rules-1c/{name}.md"
  frontmatter:
    keep: [description, alwaysApply]
    drop: [globs, category]

agents:
  # Pi has no native project custom-agent directory. These remain explicit
  # on-demand references so AGENTS.md never points at a missing file.
  copyTo: ".pi/rules-1c/agents/{name}.md"
  referenceOnly: true
  frontmatter:
    keep: [name, description, modelHint]
    rename:
      modelHint: model
    drop: [tools, allowParallel, reasoningEffort, isSubagent]

commands:
  copyTo: ".pi/prompts/{name}.md"
  include: [caveman, deploy-and-test, doctor, economymode, evolve, getconfigfiles, litemode, loadfrom1cbase, update1cbase]
  frontmatter:
    keep: [description]
    drop: [argumentHint, allowedTools]

skills:
  copyTo: ".pi/skills/{name}/"
  mode: verbatim

mcp:
  source: "content/mcp-servers.json"
  target: ".pi/mcp.json"
  schema: pi-mcp-extension
  format: json
  package:
    target: ".pi/settings.json"
    mergeKey: packages
    source: "npm:pi-mcp-extension@1.5.0"
    integrity: "sha512-tfsgi8qSr3UUKMp4vS9/FwKv+Pn2U4T/rTlAwrZkEIvz616mFrU/Ryp3b69ZDfFdkQVVXriaQmZUj4vlZDV2Uw=="
