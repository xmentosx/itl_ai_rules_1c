# Adapter: Kilo Code (VSCode extension + CLI)
#
# Describes how to copy and adapt files from content/ for Kilo Code.
# Read by both installation channels (AI-agent installer and install.ps1).
#
# Schema: closed adapter schema described in AGENT-INSTALL.md (Lean placement)
# and implemented by install.ps1.
# Notes:
#   - Current Kilo Code (VSCode extension and CLI, built on the Kilo CLI core)
#     loads project content from the `.kilo/` directory:
#       rules    -> .kilo/rules/         (legacy `.kilocode/rules/` still works
#                                         via backward compatibility)
#       agents   -> .kilo/agents/        (markdown subagent files; the legacy
#                                         extension did not expose a folder for
#                                         these — `.kilocode/subagents/` was
#                                         never an official location)
#       commands -> common command workflows are repository skills in
#                   .agents/skills/; only Kilo-native OpenSpec and ITL slash
#                   commands live in .kilo/commands/
#       skills   -> .agents/skills/       (open Agent Skills compatibility
#                                         directory, loaded by Kilo by default)
#   - MCP project-level config lives in `.kilo/kilo.json` (or any of the
#     equivalents `kilo.json` / `kilo.jsonc` / `.kilo/kilo.jsonc`) and is
#     written under the top-level `mcp` key, with per-server entries of
#     shape `{ "type": "remote"|"local", "url"|"command": ..., "enabled":
#     true }`. The legacy `.kilocode/mcp.json` with `mcpServers` is no
#     longer read by current Kilo CLI / Kilo Code (v7.x+) — see
#     https://kilo.ai/docs/automate/mcp/using-in-cli. Past installs that
#     placed MCP into `.kilocode/mcp.json` produced silently empty MCP
#     listings; on `update` the installer rewrites to the modern path.
#   - Kilo Code distinguishes primary agents from subagents via a `mode` field:
#     `subagent` (only invoked via delegation) or `all` (both primary and
#     subagent). Source flag `isSubagent: true` maps to `mode: subagent`;
#     otherwise `mode: all`.
#   - Detection accepts both `.kilo/` (new) and `.kilocode/` (legacy) so
#     existing projects keep working without re-installing.
#
# Anti-patterns observed in past agent installs (do NOT repeat):
#   - Installing into `~/.config/kilo/` (or `%APPDATA%\kilo\`) — that path is
#     the Kilo CLI's OWN global configuration directory, not a project root.
#     Installing there leaves AGENTS.md with unrewritten `content/...` paths,
#     `.dev.env` / OpenSpec / `.ai-rules.json` with nothing to bind to, and
#     the CLI does not look up rules / agents / commands / skills from its
#     own config dir. The protocol is project-scoped — see AGENT-INSTALL.md
#     `## Agent protocol > Project root is mandatory — no global installs`.
#   - Using singular directory names `.kilo/command/` / `.kilo/agent/`.
#     The CLI's lookup contract is plural — `.kilo/commands/` and
#     `.kilo/agents/`. The `copyTo` strings below are the ground truth; do
#     not paraphrase them.
#   - Dumping the whole `1c-rules` repo into the project as a `1c-rules/`
#     vendor subfolder and pointing `kilo.jsonc` at it. The protocol places
#     per-section files at the targets below; the source clone stays
#     outside the project.

tool: kilocode
schemaVersion: 1

detection:
  - exists: ".kilo/"
  - exists: ".kilocode/"

rules:
  copyTo: ".kilo/rules-1c/{name}.md"
  frontmatter:
    keep: [description, alwaysApply]
    drop: [globs, category]

agents:
  copyTo: ".kilo/agents/{name}.md"
  frontmatter:
    keep: [name, description]
    drop: [tools, modelHint]
    addIf:
      isSubagent: { mode: subagent }
      "!isSubagent": { mode: all }
    drop: [allowParallel, reasoningEffort]

commands:
  copyTo: ".agents/skills/{name}/SKILL.md"
  frontmatter:
    keep: [name, description]
    drop: [argumentHint, allowedTools]

skills:
  copyTo: ".agents/skills/{name}/"
  mode: verbatim

mcp:
  source: "content/mcp-servers.json"
  target: ".kilo/kilo.json"
  schema: kilo-mcp
  format: json
  # `.kilo/kilo.json` is the SHARED Kilo config (instructions, skills.paths,
  # custom permissions, agent overrides…), not an MCP-only file. The
  # installer therefore deep-merges only the top-level `mcp` key into the
  # existing file when present, preserving every other key the user added.
  # If `.kilo/kilo.json` does not yet exist, the installer writes a fresh
  # file containing just `{ "mcp": { … } }`.
  merge: true
  # On `update`, remove any leftover `.kilocode/mcp.json` from older
  # installs (Kilo CLI / Kilo Code v7.x+ no longer reads it; an extra copy
  # there only adds confusion in `/checkmcp` diagnostics).
  legacyTargets:
    - ".kilocode/mcp.json"
