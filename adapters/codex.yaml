# Adapter: OpenAI Codex CLI
#
# Describes how to copy and adapt files from content/ for Codex CLI.
# Read by both installation channels (AI-agent installer and install.ps1).
#
# Schema: closed adapter schema described in AGENT-INSTALL.md (Lean placement)
# and implemented by install.ps1.
# Notes:
#   - Codex is the only tool that expects agents as TOML files with a
#     `developer_instructions` string field. Agents are fully rebuilt via
#     `mode: rebuild-toml` + a `template` rather than plain frontmatter edits.
#   - On-demand rules are placed under `.codex/rules/` and referenced from
#     AGENTS.md by file path. Codex itself does not auto-discover them — the
#     directory is just a stable, predictable location that the agent reads
#     when AGENTS.md tells it to. Rules are loaded on demand (alwaysApply: false).
#   - Codex has no project-local slash-prompt directory. Shared command
#     workflows are rendered as repository skills under `.agents/skills/`,
#     which is the supported Codex project discovery surface.
#   - MCP config uses TOML [mcp_servers.<id>] sections, requiring a manual
#     TOML renderer (~50 lines in PowerShell).
#   - Template placeholders:
#       {name}, {description}, {modelHint}, {reasoningEffort} — from frontmatter;
#       {body} — the Markdown body of the source agent file.
#     Lines referencing a missing placeholder are dropped by the installer.

tool: codex
schemaVersion: 1

detection:
  - exists: ".codex/"
  - exists: "AGENTS.md"

rules:
  copyTo: ".codex/rules/{name}.md"
  frontmatter:
    keep: [description, alwaysApply]
    drop: [globs, category]

agents:
  copyTo: ".codex/agents/{name}.toml"
  mode: rebuild-toml
  template: |
    name = "{name}"
    description = "{description}"
    model = "{modelHint}"
    model_reasoning_effort = "{reasoningEffort}"
    developer_instructions = """
    {body}
    """

commands:
  copyTo: ".agents/skills/{name}/SKILL.md"
  frontmatter:
    keep: [name, description]
    drop: [argumentHint, allowedTools]

skills:
  copyTo: ".agents/skills/{name}/"
  mode: verbatim

mcp:
  source: "content/mcp-servers.json"
  target: ".codex/config.toml"
  schema: "[mcp_servers.<id>]"
  format: toml
